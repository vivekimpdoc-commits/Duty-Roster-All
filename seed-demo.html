    function log(msg, type='ok') {
      const area = document.getElementById('logArea');
      const line = document.createElement('div');
      line.className = 'log-' + type;
      line.innerHTML = msg;
      area.appendChild(line);
      area.scrollTop = area.scrollHeight;
    }

    function clearLog() {
      document.getElementById('logArea').innerHTML = '';
    }

    async function loadDemo() {
      const btn = document.getElementById('loadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ लोड हो रहा है...';
      clearLog();

      log('🚀 Demo data load शुरू...', 'info');
      log('─────────────────────────────', 'info');

      const existing = getEmployees();
      const existingEmails = existing.map(e => e.email.toLowerCase());

      let added = 0, skipped = 0;

      for (let i = 0; i < DEMO_EMPLOYEES.length; i++) {
        await new Promise(r => setTimeout(r, 60)); // small delay for animation

        const d = DEMO_EMPLOYEES[i];
        const pct = Math.round(((i + 1) / DEMO_EMPLOYEES.length) * 100);
        document.getElementById('pbar').style.width = pct + '%';
        document.getElementById('progress-label').textContent = `${i + 1}/50 – ${d.fullName}`;

        if (existingEmails.includes(d.email.toLowerCase())) {
          log(`⚠️ [${i+1}] ${d.fullName} – Already exists, skip`, 'warn');
          skipped++;
          continue;
        }

        const emp = {
          id: d.employeeId || ('EMP-' + Date.now() + i),
          fullName: d.fullName,
          email: d.email,
          phone: d.phone,
          department: d.department,
          employeeId: d.employeeId,
          experience: d.experience,
          days: d.days,
          timeSlots: d.timeSlots,
          hoursPerWeek: 40,
          preferredShift: d.preferredShift,
          skills: d.skills,
          notes: 'Demo entry',
          registeredAt: new Date().toISOString(),
          assignedShifts: 0
        };

        existing.push(emp);
        existingEmails.push(d.email.toLowerCase());
        log(`✅ [${i+1}] ${d.fullName} (${d.department}) – ${d.skills.length} skills`, 'ok');
        added++;
      }

      saveEmployees(existing);
      log('─────────────────────────────', 'info');
      log(`📊 ${added} जोड़े | ${skipped} पहले से थे`, 'info');
      log('🤖 AI Scheduler चल रहा है...', 'info');

      await new Promise(r => setTimeout(r, 300));

      const assignments = window.AIScheduler.assign(existing);
      saveAssignments(assignments);

      const filled = assignments.filter(a => a.status === 'assigned').length;
      const empty = assignments.filter(a => a.status === 'unassigned').length;

      log(`✅ ${assignments.length} असाइनमेंट जेनरेट | ${filled} भरे | ${empty} खाली`, 'ok');

      const alerts = window.AIScheduler.detectImbalances(existing, assignments);
      if (alerts.length === 0) log('✅ कोई असंतुलन नहीं! सब ठीक है।', 'ok');
      else alerts.forEach(a => log(a.msg, a.type === 'danger' ? 'warn' : 'info'));

      log('─────────────────────────────', 'info');
      log('🎉 Demo data सफलतापूर्वक लोड!', 'ok');

      document.getElementById('progress-label').textContent = `✅ पूरा! ${existing.length} कर्मचारी, ${assignments.length} शिफ्ट्स`;
      btn.disabled = false;
      btn.textContent = '🔁 फिर से लोड करें';

      showToast(`🎉 ${added} employees + ${assignments.length} shifts लोड!`);
    }

    function clearData() {
      if (!confirm('सभी डेटा डिलीट करें?')) return;
      saveEmployees([]);
      saveAssignments([]);
      clearLog();
      document.getElementById('pbar').style.width = '0%';
      document.getElementById('progress-label').textContent = 'तैयार है – बटन दबाएं';
      document.getElementById('loadBtn').textContent = '✅ 50 Demo Entries लोड करें';
      log('🗑️ सभी डेटा क्लियर कर दिया गया।', 'warn');
      showToast('🗑️ डेटा क्लियर।');
    }

      updateNavCount();
      const count = getEmployees().length;
      if (count > 0) log(`ℹ️ पहले से ${count} employees हैं।`, 'info');
