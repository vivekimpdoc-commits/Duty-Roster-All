<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ShiftMaster – Demo Data Loader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .seed-wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .seed-box{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:48px 40px;max-width:640px;width:90%;text-align:center;box-shadow:var(--shadow);}
    .seed-icon{font-size:64px;margin-bottom:20px;display:block;}
    .log-area{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:16px;text-align:left;max-height:260px;overflow-y:auto;font-size:12px;font-family:monospace;line-height:1.8;margin:20px 0;color:var(--text);}
    .log-ok{color:#10b981;}
    .log-warn{color:#f59e0b;}
    .log-info{color:#00d2ff;}
    .progress-bar-wrap{background:rgba(0,0,0,0.05);border-radius:50px;height:8px;margin:16px 0;overflow:hidden;}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:50px;transition:width .3s ease;width:0%;}
    @media(max-width:600px){
      .seed-box{padding:30px 20px;}
      .seed-icon{font-size:48px;}
      h2{font-size:20px !important;}
      .btn-next, .btn-prev { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-animated"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

  <div class="seed-wrap">
    <div class="seed-box">
      <span class="seed-icon">🚀</span>
      <h2 style="font-size:26px;font-weight:700;margin-bottom:8px">Demo Data <span class="gradient-text">Loader</span></h2>
      <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px">100 demo employees + AI shift assignments लोड करें</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pbar"></div></div>
      <p id="progress-label" style="font-size:13px;color:var(--text-muted);">तैयार है – बटन दबाएं</p>

      <div class="log-area" id="logArea"><span class="log-info">▶ यहाँ logs दिखेंगे...</span></div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn-next" id="loadBtn" onclick="loadDemo()" style="padding:14px 36px;font-size:15px">
          ✅ 100 Demo Entries लोड करें
        </button>
        <button class="btn-prev" onclick="clearData()" style="padding:14px 24px;font-size:15px;border-color:#ef4444;color:#ef4444">
          🗑️ क्लियर
        </button>
      </div>

      <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap">
        <a href="admin.html" class="btn-pri-link">🛡️ Admin डैशबोर्ड</a>
        <a href="schedule.html" class="btn-pri-link" style="background:linear-gradient(135deg,#10b981,#059669)">📅 शेड्यूल देखें</a>
        <a href="index.html" class="btn-pri-link" style="background:linear-gradient(135deg,#f59e0b,#d97706)">📝 फॉर्म</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"><span id="toast-msg"></span></div>
  <script src="app.js"></script>
  <script src="ai-scheduler.js"></script>
  <script>
    const firstNames = ["राजेश", "प्रिया", "अमित", "सुनीता", "विकास", "अनीता", "संजय", "कविता", "रोहन", "पूजा", "दिनेश", "ममता", "नितिन", "रेखा", "अजय", "शालिनी", "हरीश", "नेहा", "भूपेंद्र", "आरती", "विजय", "संगीता", "मनोज", "लक्ष्मी", "सुरेश", "दीपक", "मनीषा", "प्रमोद", "सरिता", "अरुण", "नीलम", "पवन", "किरण", "सतीश", "मीनाक्षी", "राजीव", "ज्योति", "कुणाल", "रूपा", "ओम प्रकाश", "श्वेता", "मनीष", "दिव्या", "संदीप", "अनुराधा", "वरुण", "खुशबू", "ऋषभ", "किरण", "सुनील"];
    const lastNames = ["शर्मा", "सिंह", "वर्मा", "देवी", "यादव", "गुप्ता", "पटेल", "तिवारी", "मिश्रा", "राय", "चौधरी", "शुक्ला", "जोशी", "त्रिपाठी", "कुमार", "पांडे", "कौर", "रावत", "बिष्ट", "जैन", "मौर्य", "धवन", "रानी", "पंत", "बेदी", "शेट्टी"];
    const depts = ["medical", "security", "admin", "technical", "logistics", "volunteer"];
    const dayOptions = [["monday","tuesday","wednesday","thursday","friday"], ["monday","wednesday","friday","saturday","sunday"], ["tuesday","thursday","saturday"], ["saturday","sunday"], ["monday","tuesday","friday","saturday"], ["tuesday","thursday","saturday","sunday"]];
    const timeOptions = [["morning"], ["afternoon"], ["night"], ["morning","afternoon"], ["afternoon","night"], ["morning","night"], ["morning","afternoon","night"]];
    const prefOptions = ["morning", "afternoon", "night", "any"];
    const skillOptions = ["first_aid", "security", "it_support", "management", "driving", "forklift", "machinery", "fire_safety"];

    function generateEmployees(count) {
      const employees = [];
      for (let i = 1; i <= count; i++) {
        const fn = firstNames[(i * 3) % firstNames.length];
        const ln = lastNames[(i * 7) % lastNames.length];
        const email = `${fn.split(' ')[0].toLowerCase()}.${ln.toLowerCase()}${i}@demo.com`;
        const phone = `+91 98${String(Math.floor(10000000 + Math.random() * 90000000))}`;
        const dept = depts[i % depts.length];
        const exp = Math.floor(Math.random() * 15) + 1;
        const days = dayOptions[i % dayOptions.length];
        const timeSlots = timeOptions[i % timeOptions.length];
        const prefShift = prefOptions[i % prefOptions.length];
        const numSkills = (i % 3) + 1;
        const skills = [];
        for(let j = 0; j < numSkills; j++) {
          skills.push(skillOptions[(i + j * 2) % skillOptions.length]);
        }

        employees.push({
          fullName: `${fn} ${ln}`,
          email: email,
          phone: phone,
          department: dept,
          employeeId: `EMP-${String(i).padStart(3, '0')}`,
          experience: exp,
          days: days,
          timeSlots: timeSlots,
          preferredShift: prefShift,
          skills: [...new Set(skills)]
        });
      }
      return employees;
    }

    const DEMO_EMPLOYEES = generateEmployees(100);

    function log(msg, type='ok') {
      const area = document.getElementById('logArea');
      const line = document.createElement('div');
      line.className = 'log-' + type;
      line.innerHTML = msg;
      area.appendChild(line);
      area.scrollTop = area.scrollHeight;
    }

    function clearLog() {
      document.getElementById('logArea').innerHTML = '';
    }

    async function loadDemo() {
      const btn = document.getElementById('loadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ लोड हो रहा है...';
      clearLog();

      log('🚀 Demo data load शुरू...', 'info');
      log('─────────────────────────────', 'info');

      const existing = getEmployees();
      const existingEmails = existing.map(e => e.email.toLowerCase());

      let added = 0, skipped = 0;

      for (let i = 0; i < DEMO_EMPLOYEES.length; i++) {
        await new Promise(r => setTimeout(r, 60)); // small delay for animation

        const d = DEMO_EMPLOYEES[i];
        const pct = Math.round(((i + 1) / DEMO_EMPLOYEES.length) * 100);
        document.getElementById('pbar').style.width = pct + '%';
        document.getElementById('progress-label').textContent = `${i + 1}/100 – ${d.fullName}`;

        if (existingEmails.includes(d.email.toLowerCase())) {
          log(`⚠️ [${i+1}] ${d.fullName} – Already exists, skip`, 'warn');
          skipped++;
          continue;
        }

        const emp = {
          id: d.employeeId || ('EMP-' + Date.now() + i),
          fullName: d.fullName,
          email: d.email,
          phone: d.phone,
          department: d.department,
          employeeId: d.employeeId,
          experience: d.experience,
          days: d.days,
          timeSlots: d.timeSlots,
          hoursPerWeek: 40,
          preferredShift: d.preferredShift,
          skills: d.skills,
          notes: 'Demo entry',
          registeredAt: new Date().toISOString(),
          assignedShifts: 0
        };

        existing.push(emp);
        existingEmails.push(d.email.toLowerCase());
        log(`✅ [${i+1}] ${d.fullName} (${d.department}) – ${d.skills.length} skills`, 'ok');
        added++;
      }

      saveEmployees(existing);
      log('─────────────────────────────', 'info');
      log(`📊 ${added} जोड़े | ${skipped} पहले से थे`, 'info');
      log('🤖 AI Scheduler चल रहा है...', 'info');

      await new Promise(r => setTimeout(r, 300));

      const assignments = window.AIScheduler.assign(existing);
      saveAssignments(assignments);

      const filled = assignments.filter(a => a.status === 'assigned').length;
      const empty = assignments.filter(a => a.status === 'unassigned').length;

      log(`✅ ${assignments.length} असाइनमेंट जेनरेट | ${filled} भरे | ${empty} खाली`, 'ok');

      const alerts = window.AIScheduler.detectImbalances(existing, assignments);
      if (alerts.length === 0) log('✅ कोई असंतुलन नहीं! सब ठीक है।', 'ok');
      else alerts.forEach(a => log(a.msg, a.type === 'danger' ? 'warn' : 'info'));

      log('─────────────────────────────', 'info');
      log('🎉 Demo data सफलतापूर्वक लोड!', 'ok');

      document.getElementById('progress-label').textContent = `✅ पूरा! ${existing.length} कर्मचारी, ${assignments.length} शिफ्ट्स`;
      btn.disabled = false;
      btn.textContent = '🔁 फिर से लोड करें';

      showToast(`🎉 ${added} employees + ${assignments.length} shifts लोड!`);
    }

    function clearData() {
      if (!confirm('सभी डेटा डिलीट करें?')) return;
      saveEmployees([]);
      saveAssignments([]);
      clearLog();
      document.getElementById('pbar').style.width = '0%';
      document.getElementById('progress-label').textContent = 'तैयार है – बटन दबाएं';
      document.getElementById('loadBtn').textContent = '✅ 100 Demo Entries लोड करें';
      log('🗑️ सभी डेटा क्लियर कर दिया गया।', 'warn');
      showToast('🗑️ डेटा क्लियर।');
    }

    // Show existing count on load
    window.addEventListener('DOMContentLoaded', () => {
      updateNavCount();
      const count = getEmployees().length;
      if (count > 0) log(`ℹ️ पहले से ${count} employees हैं।`, 'info');
    });
  </script>
</body>
</html>
